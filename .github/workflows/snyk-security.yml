name: Snyk Security Suite

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:

##########################################################################
# SNYK OPEN SOURCE (SCA)
##########################################################################

  snyk-open-source:
    name: Snyk Open Source
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Check dependency files
        id: deps
        shell: bash
        run: |
          if find . -type f \( \
            -name "requirements.txt" \
            -o -name "package.json" \
            -o -name "pom.xml" \
            -o -name "build.gradle" \
            -o -name "go.mod" \
          \) | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi


      - name: Install Snyk CLI
        if: steps.deps.outputs.exists == 'true'
        run: npm install -g snyk


      - name: Authenticate
        if: steps.deps.outputs.exists == 'true'
        run: snyk auth $SNYK_TOKEN


      - name: Scan Open Source Dependencies
        if: steps.deps.outputs.exists == 'true'
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high


      - name: No dependency files
        if: steps.deps.outputs.exists == 'false'
        run: |
          echo "No supported dependency files found. Skipping SCA scan."


##########################################################################
# SNYK CODE (SAST)
##########################################################################

  snyk-code:
    name: Snyk Code
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Install Snyk CLI
        run: npm install -g snyk


      - name: Authenticate
        run: snyk auth $SNYK_TOKEN


      - name: Scan Source Code
        run: |
          snyk code test \
            --severity-threshold=high


##########################################################################
# SNYK IaC
##########################################################################

  snyk-iac:
    name: Snyk IaC
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Check IaC files
        id: iac
        shell: bash
        run: |
          if find . \
            -not -path "./.github/*" \
            -type f \( \
              -name "*.tf" \
              -o -name "*.tf.json" \
              -o -name "k8s*.yaml" \
              -o -name "*deployment*.yaml" \
              -o -name "*terraform*.json" \
            \) | grep -q .; then

            echo "exists=true" >> "$GITHUB_OUTPUT"

          else

            echo "exists=false" >> "$GITHUB_OUTPUT"

          fi


      - name: Install Snyk CLI
        if: steps.iac.outputs.exists == 'true'
        run: npm install -g snyk


      - name: Authenticate
        if: steps.iac.outputs.exists == 'true'
        run: snyk auth $SNYK_TOKEN


      - name: Scan Infrastructure
        if: steps.iac.outputs.exists == 'true'
        run: |
          snyk iac test . \
            --severity-threshold=high


      - name: No IaC files
        if: steps.iac.outputs.exists == 'false'
        run: |
          echo "No IaC files found. Skipping IaC scan."


##########################################################################
# SNYK CONTAINER
##########################################################################

  snyk-container:
    name: Snyk Container
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Check for Dockerfile
        id: docker
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi


      - name: Install Snyk CLI
        if: steps.docker.outputs.exists == 'true'
        run: npm install -g snyk


      - name: Authenticate
        if: steps.docker.outputs.exists == 'true'
        run: snyk auth $SNYK_TOKEN


      - name: Build Docker Image
        if: steps.docker.outputs.exists == 'true'
        run: |
          docker build -t vulnerable-app .


      - name: Scan Container
        if: steps.docker.outputs.exists == 'true'
        run: |
          snyk container test vulnerable-app \
            --severity-threshold=high


      - name: No Dockerfile
        if: steps.docker.outputs.exists == 'false'
        run: |
          echo "No Dockerfile found. Skipping container scan."


##########################################################################
# SECURITY GATE
##########################################################################

  security-gate:

    name: Security Gate

    runs-on: ubuntu-latest

    if: always()

    needs:
      - snyk-open-source
      - snyk-code
      - snyk-iac
      - snyk-container


    steps:


      - name: Print Results
        run: |
          echo "Open Source : ${{ needs.snyk-open-source.result }}"
          echo "Code        : ${{ needs.snyk-code.result }}"
          echo "IaC         : ${{ needs.snyk-iac.result }}"
          echo "Container   : ${{ needs.snyk-container.result }}"


      - name: Fail if security scan failed
        shell: bash
        run: |

          failed=0


          # SCA
          if [[ "${{ needs.snyk-open-source.result }}" != "success" ]]; then
            failed=1
          fi


          # SAST
          if [[ "${{ needs.snyk-code.result }}" != "success" ]]; then
            failed=1
          fi


          # IaC
          if [[ "${{ needs.snyk-iac.result }}" != "success" ]]; then
            failed=1
          fi


          # Container
          if [[ "${{ needs.snyk-container.result }}" != "success" && \
                "${{ needs.snyk-container.result }}" != "skipped" ]]; then
            failed=1
          fi


          if [[ $failed -eq 1 ]]; then
            echo "❌ Security checks failed."
            exit 1
          fi


          echo "✅ All applicable Snyk security checks passed."
