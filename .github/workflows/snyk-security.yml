name: Snyk Security Suite

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  ##########################################################################
  # SNYK OPEN SOURCE (SCA)
  ##########################################################################

  snyk-open-source:
    name: Snyk Open Source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate
        run: snyk auth $SNYK_TOKEN

      - name: Scan Open Source Dependencies
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high

  ##########################################################################
  # SNYK CODE (SAST)
  ##########################################################################

  snyk-code:
    name: Snyk Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install -g snyk

      - run: snyk auth $SNYK_TOKEN

      - name: Scan Source Code
        run: |
          snyk code test \
            --severity-threshold=high

  ##########################################################################
  # SNYK IaC
  ##########################################################################

  snyk-iac:
    name: Snyk IaC
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install -g snyk

      - run: snyk auth $SNYK_TOKEN

      - name: Scan Infrastructure
        run: |
          snyk iac test . \
            --severity-threshold=high

  ##########################################################################
  # SNYK CONTAINER
  ##########################################################################

  snyk-container:
    name: Snyk Container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: docker
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Snyk CLI
        if: steps.docker.outputs.exists == 'true'
        run: npm install -g snyk

      - name: Authenticate
        if: steps.docker.outputs.exists == 'true'
        run: snyk auth $SNYK_TOKEN

      - name: Build Docker Image
        if: steps.docker.outputs.exists == 'true'
        run: |
          docker build -t vulnerable-app .

      - name: Scan Container
        if: steps.docker.outputs.exists == 'true'
        run: |
          snyk container test vulnerable-app \
            --severity-threshold=high

      - name: No Dockerfile
        if: steps.docker.outputs.exists == 'false'
        run: echo "No Dockerfile found. Skipping container scan."

  ##########################################################################
  # SECURITY GATE
  ##########################################################################

  security-gate:
    name: Security Gate

    runs-on: ubuntu-latest

    if: always()

    needs:
      - snyk-open-source
      - snyk-code
      - snyk-iac
      - snyk-container

    steps:
      - name: Print Results
        run: |
          echo "Open Source : ${{ needs.snyk-open-source.result }}"
          echo "Code        : ${{ needs.snyk-code.result }}"
          echo "IaC         : ${{ needs.snyk-iac.result }}"
          echo "Container   : ${{ needs.snyk-container.result }}"

      - name: Fail if any scan failed
        shell: bash
        run: |
          failed=0

          [[ "${{ needs.snyk-open-source.result }}" == "success" ]] || failed=1
          [[ "${{ needs.snyk-code.result }}" == "success" ]] || failed=1
          [[ "${{ needs.snyk-iac.result }}" == "success" ]] || failed=1

          # Container may be skipped if no Dockerfile exists
          if [[ "${{ needs.snyk-container.result }}" != "success" && \
                "${{ needs.snyk-container.result }}" != "skipped" ]]; then
            failed=1
          fi

          if [[ $failed -eq 1 ]]; then
            echo "❌ One or more Snyk scans failed."
            exit 1
          fi

          echo "✅ All Snyk scans passed."